name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --configuration Release --no-restore
      
    - name: Publish
      run: dotnet publish --configuration Release --no-build
      
    - name: Get version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: OstoraPlayerMention v${{ steps.version.outputs.VERSION }}
        body: |
          ## OstoraPlayerMention v${{ steps.version.outputs.VERSION }}
          
          ### 🎯 Features
          - Player mention detection with @playername syntax
          - Sound notifications for mentioned players
          - Private notifications (hidden from public chat)
          - Simple permission system (ostora.mention.use)
          - Configurable cooldown and sound settings
          - Multi-language support
          
          ### 📦 Installation
          1. Download `OstoraPlayerMention.zip` from the assets below
          2. Extract to your server's `addons/swiftlys2/plugins/` directory
          3. Restart your server or reload plugins
          4. Configure as needed
          
          ### 🔧 Requirements
          - SwiftlyS2 framework
          - AudioApi plugin
          
          ### 📄 License
          MIT License - see LICENSE file for details
          
          ### 🙏 Acknowledgments
          - **[T3Marius/SwiftlyS2-SankySounds](https://github.com/T3Marius/SwiftlyS2-SankySounds)** - Inspiration and reference for audio integration
        draft: false
        prerelease: false
        files: |
          build/OstoraPlayerMention.zip
